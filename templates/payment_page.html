<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЮKassa — Безопасный платеж</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-900 flex flex-col justify-between min-h-screen font-sans p-4">

    <header class="bg-[#2D0D85] text-white py-4 px-6 shadow-md rounded-2xl max-w-md mx-auto w-full mt-4 flex justify-between items-center">
        <span class="text-2xl font-black tracking-tight">ю<span class="text-[#00C200]">kassa</span></span>
        <span class="text-xs font-semibold bg-white/10 px-3 py-1.5 rounded-lg border border-white/10">Тестовый режим</span>
    </header>

    <main class="flex-grow max-w-md w-full mx-auto py-6 flex flex-col justify-center">
        <div class="bg-white rounded-3xl shadow-xl border border-slate-200/60 p-8 space-y-6">
            <div class="text-center space-y-1">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">К оплате за заказ #{{ order.id }}</p>
                <p class="text-4xl font-black text-slate-900">{{ order.total_price }} ₽</p>
            </div>

            <form method="POST" class="space-y-4">
                {% csrf_token %}
                <div class="space-y-3 p-6 bg-gradient-to-br from-slate-800 to-slate-950 text-white rounded-2xl shadow-md relative overflow-hidden">
                    <div class="space-y-1">
                        <label class="block text-[10px] font-black uppercase tracking-wider text-slate-400">Номер карты</label>
                        <input type="text" id="cardNum" required placeholder="1111 2222 3333 4444" class="w-full bg-white/5 border border-white/10 rounded-xl px-3 py-2 text-base font-bold tracking-widest focus:outline-none focus:border-[#00C200] transition">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <label class="block text-[10px] font-black uppercase tracking-wider text-slate-400">Срок действия</label>
                            <input type="text" id="cardDate" required placeholder="12/29" class="w-full bg-white/5 border border-white/10 rounded-xl px-3 py-2 text-sm font-bold tracking-wider text-center focus:outline-none focus:border-[#00C200] transition">
                        </div>
                        <div class="space-y-1">
                            <label class="block text-[10px] font-black uppercase tracking-wider text-slate-400">CVC / CVV</label>
                            <input type="password" maxlength="3" required placeholder="•••" class="w-full bg-white/5 border border-white/10 rounded-xl px-3 py-2 text-sm font-bold tracking-wider text-center focus:outline-none focus:border-[#00C200] transition">
                        </div>
                    </div>
                </div>
                <button type="submit" class="w-full bg-[#00C200] hover:bg-[#00ab00] text-white font-black py-4 rounded-2xl transition duration-150 shadow-lg active:scale-98">
                    Оплатить {{ order.total_price }} ₽
                </button>
            </form>
        </div>
    </main>

    <footer class="py-4 text-center text-slate-400 text-xs">&copy; 2026 ООО «НКО ЮМани». Все права защищены.</footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cardNum = document.getElementById('cardNum');
            if (cardNum) {
                cardNum.addEventListener('input', (e) => {
                    let val = e.target.value.replace(/\D/g, '').substring(0, 16);
                    let formatted = val.match(/.{1,4}/g);
                    e.target.value = formatted ? formatted.join(' ') : '';
                });
            }
            const cardDate = document.getElementById('cardDate');
            if (cardDate) {
                cardDate.addEventListener('input', (e) => {
                    let val = e.target.value.replace(/\D/g, '').substring(0, 4);
                    if (val.length >= 2) {
                        e.target.value = val.substring(0, 2) + '/' + val.substring(2, 4);
                    } else {
                        e.target.value = val;
                    }
                });
            }
        });
    </script>
</body>
</html>
