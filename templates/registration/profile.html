{% extends 'base.html' %}

{% block title %}Личный кабинет - Fan-Sport{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto bg-white dark:bg-slate-900 p-8 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm mt-10 transition-colors duration-300">
    <h2 class="text-2xl font-black text-slate-900 dark:text-white mb-6">Личный кабинет</h2>
    <div class="space-y-4">
        <div class="flex border-b border-slate-100 dark:border-slate-800 pb-3">
            <span class="w-1/3 text-slate-500 dark:text-slate-400 font-medium">Имя пользователя:</span>
            <span class="w-2/3 text-slate-900 dark:text-white font-semibold">{{ user.username }}</span>
        </div>
        <div class="flex border-b border-slate-100 dark:border-slate-800 pb-3">
            <span class="w-1/3 text-slate-500 dark:text-slate-400 font-medium">Email:</span>
            <span class="w-2/3 text-slate-900 dark:text-white">{{ user.email|default:"Не указан" }}</span>
        </div>
        <div class="flex pb-3">
            <span class="w-1/3 text-slate-500 dark:text-slate-400 font-medium">Статус:</span>
            <span class="w-2/3 text-green-600 dark:text-green-400 font-semibold">Активен</span>
        </div>
    </div>
</div>
{% endblock %}
