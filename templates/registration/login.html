{% extends 'base.html' %}

{% block title %}Вход - Fan-Sport{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white dark:bg-slate-900 p-8 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm mt-10 transition-colors duration-300">
    <h2 class="text-2xl font-black text-slate-900 dark:text-white mb-6 text-center">Войти в аккаунт</h2>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        {% if form.errors %}
            <div class="p-3 bg-red-50 dark:bg-red-950/30 border border-red-200 dark:border-red-900/50 text-red-700 dark:text-red-400 text-sm rounded-xl">
                Неверное имя пользователя или пароль.
            </div>
        {% endif %}
        <div>
            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1">Имя пользователя</label>
            <input type="text" name="username" required class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 text-slate-950 dark:text-white rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition">
        </div>
        <div>
            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1">Пароль</label>
            <input type="password" name="password" required class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 text-slate-950 dark:text-white rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition">
        </div>
        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl font-bold transition active:scale-95 shadow-sm">Войти</button>
    </form>
    <p class="mt-4 text-center text-sm text-slate-500 dark:text-slate-400">
        Нет аккаунта? <a href="{% url 'register' %}" class="text-indigo-600 dark:text-indigo-400 hover:underline">Зарегистрироваться</a>
    </p>
</div>
{% endblock %}
